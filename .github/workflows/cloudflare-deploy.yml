name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

# Concurrency: cancel in-progress runs for the same PR/branch when a new push
# arrives (faster feedback, lower CI cost). Keep main/master deploys serialized
# so we never race two production rollouts.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        # rehype-mermaid spins up Chromium at build time to render mermaid
        # blocks into inline SVG. Cache the browser binaries to skip the
        # ~120MB download on every CI run.
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        # --with-deps installs the system libraries Chromium needs on Ubuntu
        # (libnss3, libxss1, libasound2, etc). Skipping this manifests as
        # "browserType.launch: Executable doesn't exist" partway through the
        # build. The action is idempotent — if the cache hit and binaries
        # are present, this is a no-op.
        run: bunx playwright install --with-deps chromium

      - name: Run unit tests
        run: bun run test

      - name: Type check
        run: bun run astro check

      - name: Build site
        run: bun run build
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  # Preview deploy: PRs upload a Worker version (no traffic) and post the
  # generated preview URL as a sticky PR comment. `wrangler versions upload`
  # uses Workers' built-in versioning to produce a unique URL of the form
  # `<version-id>-codeseys-personal-website.<subdomain>.workers.dev` without
  # touching the production deployment. This is the staging URL the user can
  # poke and Playwright can scrape.
  preview:
    runs-on: ubuntu-latest
    name: Preview Deploy
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    outputs:
      preview_url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Build site
        run: bun run build
        env:
          NODE_ENV: production

      - name: Upload preview Worker version
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          # `versions upload` uploads a new version WITHOUT routing traffic to
          # it. The action prints a preview URL we can hit directly. Production
          # at codeseys.io stays on the previously-deployed version.
          command: versions upload --message "PR #${{ github.event.number }} (${{ github.event.pull_request.head.sha }})"
          packageManager: bun
          # COMMAND_OUTPUT capture so the next step can grep the preview URL
          # out of stdout. wrangler-action v3 does not currently populate
          # `deployment-url` for `versions upload` (cloudflare/wrangler-action#343),
          # so we have to scrape stdout ourselves. The action exposes the
          # captured stdout under `outputs.command-output`.

      - name: Extract preview URL from wrangler stdout
        id: preview_url
        env:
          CMD_OUT: ${{ steps.deploy.outputs.command-output }}
        run: |
          # wrangler prints `Version Preview URL: https://<id>-codeseys-personal-website.<sub>.workers.dev`
          # Pluck the first such URL out of the captured stdout. Fall back to
          # an empty string so the comment step doesn't crash.
          url=$(printf '%s\n' "$CMD_OUT" | grep -oE 'https://[a-f0-9-]+-codeseys-personal-website\.[a-z0-9-]+\.workers\.dev' | head -n 1 || true)
          echo "preview_url=$url" >> "$GITHUB_OUTPUT"
          echo "Captured preview URL: $url"

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cloudflare-preview
          message: |
            ### 🚀 Preview deployed

            **URL:** ${{ steps.preview_url.outputs.preview_url || '_(URL not captured — check workflow logs)_' }}
            **Commit:** `${{ github.event.pull_request.head.sha }}`
            **Worker version:** uploaded but not promoted (production at codeseys.io is unchanged)

            <sub>Updated on every push to this PR.</sub>

  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Build site
        run: bun run build
        env:
          NODE_ENV: production

      # First-party Cloudflare Workers deploy.
      # `wrangler.jsonc` references `@astrojs/cloudflare/entrypoints/server`
      # and ships `dist/` as the static-assets directory.
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          packageManager: bun
